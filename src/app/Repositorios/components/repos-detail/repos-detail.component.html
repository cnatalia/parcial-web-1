
    <div *ngIf="repo"
  (click)="onClose()" class="overlay fixed inset-0 z-[100] flex items-center justify-center p-md">
      <!-- Backdrop -->
      <div class="absolute inset-0 bg-gray-950/40 backdrop-blur-sm"></div>
      <!-- Modal Content -->
      <div
      (click)="$event.stopPropagation()"
        class="relative bg-white w-full max-w-[800px] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-white/20 overflow-hidden"
      >
        <!-- Modal Header -->
        <div
          class="p-xl bg-surface-container-lowest border-b border-outline-variant/30 relative"
        >
          <button
           (click)="onClose()"
            class="absolute right-6 top-6 text-outline hover:text-on-surface transition-colors"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-primary text-[32px]"
              >folder_open</span
            >
            <h2 class="font-display-lg text-[28px] text-on-surface">
              {{repo.name}}
            </h2>
          </div>
          <p
            class="text-on-surface-variant font-body-lg text-body-lg max-w-[600px]"
          >
            {{repo.description}}
          </p>
        </div>
        <!-- Modal Body -->
        <div class="p-xl grid grid-cols-1 md:grid-cols-2 gap-xl">
          <!-- Left Column: Primary Details -->
          <div class="space-y-8">
            <div>
              <h4
                class="font-label-caps text-label-caps text-outline uppercase mb-3"
              >
                Repository Details
              </h4>
              <div class="grid grid-cols-2 gap-4">
                <div class="bg-surface-container-low p-4 rounded-xl">
                  <div
                    class="text-outline font-label-caps text-[10px] uppercase mb-1"
                  >
                    Language
                  </div>
                  <div
                    class="flex items-center gap-2 font-headline-md text-headline-md text-on-surface"
                  >
                    <span class="w-3 h-3 rounded-full bg-orange-400"></span>
                    {{repo.language}}
                  </div>
                </div>
                <div class="bg-surface-container-low p-4 rounded-xl">
                  <div
                    class="text-outline font-label-caps text-[10px] uppercase mb-1"
                  >
                    Stars
                  </div>
                  <div
                    class="flex items-center gap-2 font-headline-md text-headline-md text-on-surface"
                  >
                    <span
                      class="material-symbols-outlined text-amber-400"
                      style="font-variation-settings: &quot;FILL&quot; 1"
                      >star</span
                    >
                    {{repo.stars}}
                  </div>
                </div>
              </div>
            </div>
            <div>
              <h4
                class="font-label-caps text-label-caps text-outline uppercase mb-3"
              >
                Created Date
              </h4>
              <div class="flex items-center gap-2 text-on-surface font-body-lg">
                <span class="material-symbols-outlined text-outline"
                  >calendar_today</span
                >
               {{repo.createdAt}}
              </div>
            </div>

          </div>
          <!-- Right Column: Owners & Access -->
          <div
          *ngIf="!loadingUser && user"
            class="bg-surface-container-low/50 p-6 rounded-2xl border border-outline-variant/20"
          >
            <h4
              class="font-label-caps text-label-caps text-outline uppercase mb-4"
            >
              Owner
            </h4>
            <div class="space-y-4">
              <div
                class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-outline-variant/10"
              >
                <div class="flex items-center gap-3">
                  <img
                    class="w-10 h-10 rounded-full"
                    [src]="user.avatarUrl"
                    data-alt="Close-up portrait of a male software architect with a thoughtful expression, set against a blurred background of a modern library. The lighting is warm and cinematic, emphasizing textures and clarity. The color scheme is sophisticated with soft earthy tones and vibrant accent colors that reflect a high-end, clean UI design aesthetic."
                  />
                  <div>
                    <div class="font-button text-on-surface">{{user.name}}</div>
                    <div class="text-[12px] text-outline">{{user.username}}</div>
                  </div>
                </div>
                <span
                  class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded text-[10px] font-bold"
                  >{{user.role}}</span
                >
              </div>


            </div>

          </div>
        </div>
      </div>
    </div>
